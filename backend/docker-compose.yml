services:
  db:
    image: pgvector/pgvector:pg16
    container_name: pakalorie-postgres
    environment:
      POSTGRES_DB: pakalorie
      POSTGRES_USER: pakalorie
      POSTGRES_PASSWORD: pakalorie
    ports:
      - "5432:5432"
    volumes:
      - pakalorie_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pakalorie -d pakalorie"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: pakalorie-api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+asyncpg://pakalorie:pakalorie@db:5432/pakalorie
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://*.expo.dev,exp://*,http://localhost:8081,http://localhost:19006}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pakalorie_pgdata:
